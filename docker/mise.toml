[settings]
# Sequential execution to avoid race conditions in parallel tests
jobs = 1

[tools]
python = "3.14"
node = "v25.6.1"
poetry = { version = "2.3.2", pyproject = "/app/pyproject.toml" }
"github:endevco/aube" = "1.22.0"

[env]
# Mise creates and activates this virtualenv automatically
_.python.venv = { path = ".venv", create = true }

# Tasks defined inline; host's tasks.toml is not included here.
# Host wraps `dj`/`start` with `aubr varlock` to load .env. In the
# container, compose passes env directly and varlock isn't present.

[tasks.p]
run = "poetry"

[tasks.dj]
run = "django-admin"

[tasks.start]
run = "honcho start -e /dev/null -f Procfile.dev"

[tasks.frontend-deps]
run = "aube install --filter ./src/ludamus/client --frozen-lockfile --no-optional"

[tasks.build-frontend]
run = "aubr -C src/ludamus/client build"

[tasks.gunicorn]
run = """
gunicorn \
    --bind 0.0.0.0:8000 \
    --workers 4 \
    --threads 2 \
    --worker-class gthread \
    --worker-tmp-dir /dev/shm \
    --access-logfile - \
    --error-logfile - \
    --chdir /app/src ludamus.edges.wsgi:application
"""
