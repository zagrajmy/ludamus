[settings]
# Sequential execution to avoid race conditions in parallel tests
jobs = 1

[tools]
python = "3.14"
node = "v25.6.1"
poetry = { version = "2.3.2", pyproject = "/app/pyproject.toml" }

[env]
# Mise creates and activates this virtualenv automatically
_.python.venv = { path = ".venv", create = true }

# Tasks are defined explicitly here, not included from /app/tasks.toml.
# The host tasks wrap `dj` / `start` with `./scripts/varlock run --` to load
# .env layers; inside the container, env is already supplied by docker
# compose's environment passthrough, and scripts/varlock is not present.

[tasks.p]
run = "poetry"

[tasks.dj]
run = "django-admin"

[tasks.start]
run = "honcho start -e /dev/null -f Procfile.dev"

[tasks.build-frontend]
run = "cd src/ludamus/client && npm install && npm run build"

[tasks.gunicorn]
run = """
gunicorn \
    --bind 0.0.0.0:8000 \
    --workers 4 \
    --threads 2 \
    --worker-class gthread \
    --worker-tmp-dir /dev/shm \
    --access-logfile - \
    --error-logfile - \
    --chdir /app/src ludamus.edges.wsgi:application
"""
