---
name: ludamus

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ../../
      dockerfile: docker/Dockerfile
      target: dev
      args:
        DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
        ENV: ${ENV}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../../src:/app/src
      - ../../tests:/app/tests
      - ../../pyproject.toml:/app/pyproject.toml
      - ../../.pylintrc:/app/.pylintrc
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      MISE_TRUSTED_CONFIG_PATHS: /app/mise.toml
      # Container env is provided by varlock (see [tasks.dc] in mise.toml).
      # Listed below as implicit pass-throughs from the host process env.
      ENV:
      DEBUG:
      DEBUG_TOOLBAR:
      USE_POSTGRES:
      DJANGO_SETTINGS_MODULE:
      PYTHONPATH:
      SECRET_KEY:
      ALLOWED_HOSTS:
      ROOT_DOMAIN:
      SUPPORT_EMAIL:
      SESSION_COOKIE_DOMAIN:
      STATIC_ROOT:
      MEDIA_ROOT:
      DB_NAME:
      DB_USER:
      DB_PASSWORD:
      DB_HOST:
      DB_PORT:
      AUTH0_DOMAIN:
      AUTH0_CLIENT_ID:
      AUTH0_CLIENT_SECRET:
      CREDENTIALS_ENCRYPTION_KEY:
      MEMBERSHIP_API_BASE_URL:
      MEMBERSHIP_API_TOKEN:
      MEMBERSHIP_API_TIMEOUT:
      MEMBERSHIP_API_CHECK_INTERVAL:
    ports:
      - '127.0.0.1:8000:8000'
      - '127.0.0.1:5173:5173'
    command: [ "dj", "migrate", "--noinput", ":::", "dj", "createcachetable", ":::", "dj", "downloadvendor", ":::", "start" ]
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/healthz/ || exit 1" ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  static_volume:
  media_volume:
