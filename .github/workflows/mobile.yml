---
name: Mobile

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/ludamus/client/**"
      - "src/ludamus/templates/**"
      - "tests/e2e/**"
      - "scripts/reproduce-ios-modal-bugs.*"
      - "scripts/reproduce-ios-scrubber-longpress.*"
      - ".github/workflows/mobile.yml"

permissions:
  contents: read

jobs:
  ios-regressions:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          # ponytail: macOS poetry venv links to Homebrew's python framework;
          # caching it breaks when the runner image bumps python@3.14's patch
          # (dyld "Library not loaded" / Abort trap 6). Reinstall fresh instead.
          cache: false

      - uses: oven-sh/setup-bun@v2

      - run: mise install
      - run: mise exec -- poetry install

      - name: Install agent-device
        run: bun install -g agent-device@0.14.7

      - name: Prepare iOS simulator
        run: |
          UDID=$(python - <<'PY'
          import json
          import subprocess

          output = subprocess.check_output([
              "xcrun",
              "simctl",
              "list",
              "devices",
              "available",
              "-j",
          ])
          devices = [
              device
              for runtime_devices in json.loads(output)["devices"].values()
              for device in runtime_devices
              if device.get("isAvailable") and "iPhone" in device.get("name", "")
          ]
          preferred = next((device for device in devices if device["name"] == "iPhone 16"), None)
          selected = preferred or devices[0]
          print(selected["udid"])
          PY
          )
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "UDID=$UDID" >> "$GITHUB_ENV"

      - name: Bootstrap e2e fixtures
        run: mise run test:e2e:prep

      - name: Start local e2e server
        run: |
          mise run test:e2e:serve > ios-modal-server.log 2>&1 &
          echo $! > ios-modal-server.pid

      - name: Wait for local e2e server
        run: |
          for _ in {1..60}; do
            if curl --fail --silent --show-error http://localhost:8000/event/autumn-open/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Local e2e server did not become ready" >&2
          tail -200 ios-modal-server.log >&2
          exit 1

      - name: Run iOS Safari modal regression
        env:
          AGENT_DEVICE_DAEMON_TIMEOUT_MS: 240000
          AGENT_DEVICE_DAEMON_STARTUP_TIMEOUT_MS: 30000
          BASE_URL: http://localhost:8000
          IOS_DEVICE_NAME: iPhone 16
          SESSION: ios-modal-regression
        run: |
          for attempt in 1 2; do
            if scripts/reproduce-ios-modal-bugs.ts; then
              exit 0
            fi
            echo "iOS modal regression attempt ${attempt} failed; retrying after simulator cleanup" >&2
            xcrun simctl terminate "$UDID" com.apple.mobilesafari || true
            sleep 15
          done
          exit 1

      - name: Run iOS Safari scrubber long-press regression
        env:
          AGENT_DEVICE_DAEMON_TIMEOUT_MS: 240000
          AGENT_DEVICE_DAEMON_STARTUP_TIMEOUT_MS: 30000
          BASE_URL: http://localhost:8000
          IOS_DEVICE_NAME: iPhone 16
          SESSION: ios-scrubber-regression
        run: |
          for attempt in 1 2; do
            if scripts/reproduce-ios-scrubber-longpress.ts; then
              exit 0
            fi
            echo "iOS scrubber regression attempt ${attempt} failed; retrying after simulator cleanup" >&2
            xcrun simctl terminate "$UDID" com.apple.mobilesafari || true
            sleep 15
          done
          exit 1

      - name: Stop local e2e server
        if: always()
        run: |
          if [ -f ios-modal-server.pid ]; then
            kill "$(cat ios-modal-server.pid)" || true
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ios-modal-regression-logs
          path: |
            ios-modal-server.log
            ~/.agent-device/logs/
          retention-days: 14
