---
name: Mutation Tests

on:
  schedule:
    - cron: '0 2 * * *'  # 2:00 AM UTC daily, on main branch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run install
      - run: mise run test:mutation

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: mutation-report
          path: ./coverage/gremlins/gremlins.json
          retention-days: 30
