---
name: CI

on:
  pull_request:
    paths-ignore: [ "docs/**" ]

  push:
    branches: [ "master", "main" ]
    paths-ignore: [ "docs/**" ]

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run install
      - run: mise run prcheck --jobs 4

  impeccable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run impeccable

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run install

      # Integration/unit tests → .coverage.unit
      - run: mise run test -- --cov

      # E2E tests → .coverage.e2e
      - name: Install Playwright Browsers
        run: mise run install:playwright
      - name: Run end-to-end tests
        run: mise run e2e

      # Combine and upload
      - name: Combine coverage reports
        run: mise run coverage:combine
        if: ${{ !cancelled() }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ./tests/e2e/playwright-report/
          retention-days: 30
