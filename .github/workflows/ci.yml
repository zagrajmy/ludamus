---
name: CI

on:
  pull_request:
    paths-ignore: [ "docs/**" ]

  push:
    branches: [ "master", "main" ]
    paths-ignore: [ "docs/**" ]

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run p install
      - run: mise run prcheck --jobs 4

  varlock-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: aube install --no-optional
      - run: aube exec varlock scan

  impeccable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run impeccable

  frontend-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - run: mise install
      - name: install deps
        run: aube install --no-optional
      # Non-blocking: fallow surfaces dead code, duplication, and
      # complexity hotspots as a report without failing the build.
      - name: Analyze frontend TypeScript (fallow)
        continue-on-error: true
        run: mise run fallow

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ludamus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run p install
      # PostgreSQL-only tests: row-level locking (select_for_update) is a
      # no-op on the SQLite backend used by the main `test` job below.
      - run: mise run test:postgres

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run p install

      # Integration/unit tests → .coverage.unit
      - run: mise run test -- --cov

      # E2E tests → .coverage.e2e
      - name: Install Playwright Browsers
        run: mise run install:playwright
      - name: Run end-to-end tests
        id: e2e
        run: mise run e2e

      # Combine and upload only when unit + e2e tests passed
      - name: Combine coverage reports
        run: mise run coverage:combine
        if: success()
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          disable_search: true

      - uses: actions/upload-artifact@v4
        if: always() && !cancelled()
        with:
          name: playwright-report
          path: ./tests/e2e/playwright-report/
          retention-days: 30

      - name: Assert e2e passed
        if: always()
        run: test "${{ steps.e2e.outcome }}" = "success"
