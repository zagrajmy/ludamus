name: Deploy on production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Rebuild and upstart dockers
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://zagrajmy.net
    steps:
      - name: Checkout (provides .env.schema for varlock validation)
        uses: actions/checkout@v4

      - name: Materialize .env.local from environment variables and secrets
        env:
          # Not configured in the GitHub Environment — hardcoded here.
          ENV: production
          DJANGO_SETTINGS_MODULE: ludamus.edges.settings
          DEBUG: 'false'
          # Non-sensitive config — GitHub Environment variables.
          USE_POSTGRES: ${{ vars.USE_POSTGRES }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN }}
          SESSION_COOKIE_DOMAIN: ${{ vars.SESSION_COOKIE_DOMAIN }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          AUTH0_CLIENT_ID: ${{ vars.AUTH0_CLIENT_ID }}
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          MEMBERSHIP_API_BASE_URL: ${{ vars.MEMBERSHIP_API_BASE_URL }}
          SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
          STATIC_ROOT: ${{ vars.STATIC_ROOT }}
          MEDIA_ROOT: ${{ vars.MEDIA_ROOT }}
          GS_BUCKET_NAME: ${{ vars.GS_BUCKET_NAME }}
          GS_LOCATION: ${{ vars.GS_LOCATION }}
          POSTGRES_DATA_PATH: ${{ vars.POSTGRES_DATA_PATH }}
          STATIC_DATA_PATH: ${{ vars.STATIC_DATA_PATH }}
          MEDIA_DATA_PATH: ${{ vars.MEDIA_DATA_PATH }}
          WEB_PORT: ${{ vars.WEB_PORT }}
          # Sensitive config — GitHub Environment secrets.
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          MEMBERSHIP_API_TOKEN: ${{ secrets.MEMBERSHIP_API_TOKEN }}
          GS_CREDENTIALS_JSON: ${{ secrets.GS_CREDENTIALS_JSON }}
          EMAIL_URL: ${{ secrets.EMAIL_URL }}
        run: |
          set -eu
          : > .env.local
          for k in ENV DEBUG USE_POSTGRES DJANGO_SETTINGS_MODULE \
                   ALLOWED_HOSTS ROOT_DOMAIN SESSION_COOKIE_DOMAIN \
                   DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD \
                   SECRET_KEY CREDENTIALS_ENCRYPTION_KEY \
                   AUTH0_CLIENT_ID AUTH0_CLIENT_SECRET AUTH0_DOMAIN \
                   MEMBERSHIP_API_BASE_URL MEMBERSHIP_API_TOKEN \
                   EMAIL_URL SUPPORT_EMAIL STATIC_ROOT MEDIA_ROOT \
                   POSTGRES_DATA_PATH STATIC_DATA_PATH MEDIA_DATA_PATH \
                   WEB_PORT \
                   GS_BUCKET_NAME GS_CREDENTIALS_JSON GS_LOCATION; do
            v="$(printenv "$k" || true)"
            if [ -n "$v" ]; then
              printf "%s='%s'\n" "$k" "$v" >> .env.local
            fi
          done

      - name: Validate .env.local with varlock
        env:
          ENV: production
        run: |
          # varlock loads .env.schema + .env + .env.local and validates
          # against the schema; exits non-zero if a @required var (incl.
          # forEnv(production) ones) is missing or malformed. Output is
          # discarded so resolved values never reach the run log.
          npx -y varlock@1.1.0 load > /dev/null

      - name: Upload .env.local to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          source: .env.local
          target: ludamus/

      - name: Verify the prebuilt image exists in GHCR
        # Fail fast (before touching prod) if the "Build production image"
        # workflow hasn't published an image for this commit yet.
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ vars.GHCR_USER }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker buildx imagetools inspect \
            "ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_COMMIT_SHA: ${{ github.sha }}
          APP_IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          GHCR_USER: ${{ vars.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          envs: GITHUB_COMMIT_SHA,APP_IMAGE,GHCR_USER,GHCR_TOKEN
          # Default is 10m; a cold pull of the prebuilt images can exceed it and
          # drone-ssh kills the command mid-pull ("Run Command Timeout").
          command_timeout: 13m
          script: |
            set -ex
            cd ludamus/
            chmod 600 .env.local
            git fetch
            git checkout $GITHUB_COMMIT_SHA
            export GIT_COMMIT_SHA=$(git rev-parse --short HEAD)
            # Authenticate to GHCR to pull the private prebuilt image, then drop
            # the credentials again once the images are local.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            # .env.local was validated by varlock on the CI runner. Here the
            # compose CLI reads it: --env-file feeds ${VAR} interpolation,
            # and prod.yaml's `env_file:` injects it into the containers.
            # APP_IMAGE pins the exact image built for this revision.
            docker compose --env-file .env.local -p ludamus -f docker/compose/prod.yaml pull
            docker compose --env-file .env.local -p ludamus -f docker/compose/prod.yaml up -d
            docker logout ghcr.io
            docker image prune -f
