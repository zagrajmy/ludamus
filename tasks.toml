[p]
description = "Run any Poetry subcommand"
run = "poetry"

[dj]
description = "Run any django-admin subcommand"
run = "aubr varlock django-admin"

[messages]
description = "Extract translatable strings into locale/pl (file-only locations, no line numbers)"
run = "aubr varlock django-admin makemessages -l pl --add-location=file"

[messages-compile]
description = "Compile locale/pl translations to .mo"
run = "aubr varlock django-admin compilemessages -l pl"

[messages-check]
description = "Fail if the PL catalog is stale (un-extracted strings) or has untranslated/fuzzy entries"
env.DJANGO_SETTINGS_MODULE = "ludamus.edges.settings"
env.PYTHONPATH = "src"
env.ENV = "local"
env.ROOT_DOMAIN = "testserver"
env.ALLOWED_HOSTS = ".testserver"
env.SESSION_COOKIE_DOMAIN = ".testserver"
env.DB_NAME = ":memory:"
env.SECRET_KEY = "dev-secret-key"
env.AUTH0_CLIENT_ID = "test-auth0-client-id"
env.AUTH0_CLIENT_SECRET = "test-auth0-client-secret"
env.AUTH0_DOMAIN = "auth0.example.com"
env.CREDENTIALS_ENCRYPTION_KEY = "gWc408f8j3ZQUm5Ly4EXQC2EwFRf50AhePkmZKL5N9E="
env.MEMBERSHIP_API_BASE_URL = "https://membership-test.example.com/api/v1/endpoint"
env.MEMBERSHIP_API_TOKEN = "membership-test-token"
run = '''
set -eu
mise bootstrap packages apply --yes
po=src/ludamus/locale/pl/LC_MESSAGES/django.po
# 1. Extraction must be current. Back up the catalog, regenerate, and compare
#    against the backup ignoring the POT-Creation-Date header. Restoring from
#    the backup (not `git checkout`) keeps any uncommitted edits intact, so the
#    check is safe to run on a dirty tree.
pre="$(mktemp)"
cp "$po" "$pre"
django-admin makemessages -l pl --add-location=file
drift="$(diff -I'POT-Creation-Date' "$pre" "$po" || true)"
cp "$pre" "$po"
rm -f "$pre"
if [ -n "$drift" ]; then
  echo "ERROR: message catalog is stale — run 'mise run messages' and commit the result." >&2
  printf '%s\n' "$drift" >&2
  exit 1
fi
# 2. Nothing ships untranslated: msgfmt reports any fuzzy/untranslated entries.
stats=$(msgfmt --check --statistics -o /dev/null "$po" 2>&1)
echo "$stats"
if printf '%s' "$stats" | grep -qE 'fuzzy|untranslated'; then
  echo "ERROR: $po has fuzzy/untranslated entries — translate them and commit:" >&2
  msgattrib --untranslated --only-fuzzy --no-obsolete "$po" | grep '^msgid "' | grep -v '^msgid ""' >&2 || true
  exit 1
fi
echo "Translations fresh: extraction current, all messages translated."
'''

[start]
description = "Start Django dev server with frontend watch"
run = "aubr varlock ./scripts/dev"

[dev]
description = "Start Django dev server with frontend watch"
run = "aubr varlock ./scripts/dev"

[build-frontend]
description = "Build frontend assets (CSS + JS)"
run = "aubr -C src/ludamus/client build"

[bootstrap]
description = "Set up the dev environment from scratch (idempotent)"
run = """
mise bootstrap packages apply --yes
poetry install
aube install
if [ ! -f .env.local ]; then
  python -c "
import secrets
from cryptography.fernet import Fernet
print(f'SECRET_KEY={secrets.token_urlsafe(50)}')
print(f'DB_PASSWORD=dev-{secrets.token_hex(8)}')
print(f'AUTH0_CLIENT_SECRET={secrets.token_hex(16)}')
print(f'CREDENTIALS_ENCRYPTION_KEY={Fernet.generate_key().decode()}')
" > .env.local
  echo "Generated .env.local with per-dev secrets."
fi
aubr varlock django-admin migrate --noinput
aubr varlock django-admin createcachetable
aubr varlock django-admin downloadvendor
aubr varlock python tests/e2e/scripts/bootstrap_data.py
aubr varlock python tests/e2e/scripts/bootstrap_facilitators.py
aubr varlock python tests/e2e/scripts/bootstrap_timetable.py
"""
