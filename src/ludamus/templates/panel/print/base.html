{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
    <head>
        <meta charset="utf-8">
        <meta name="description" content="{{ document.event_name }}">
        <title>{{ document.event_name }}</title>
        <style>
            @page {
                size: A4;
                margin: 14mm;

                @bottom-right {
                    content: counter(page) " / " counter(pages);
                    font: 8pt sans-serif;
                    color: #6b7280;
                }
            }

            * {
                box-sizing: border-box;
            }

            body {
                font-family: sans-serif;
                color: #111827;
                font-size: 10pt;
                margin: 0;
            }

            .doc-header {
                border-bottom: 1.5pt solid #111827;
                padding-bottom: 4mm;
                margin-bottom: 6mm;
            }

            .doc-header .event-name {
                font-size: 16pt;
                font-weight: 700;
            }

            .doc-header .event-dates {
                font-size: 9pt;
                color: #6b7280;
                margin-top: 1mm;
            }

            .empty {
                color: #9ca3af;
                font-style: italic;
            }
        </style>
        {% block extra_style %}
        {% endblock extra_style %}
    </head>
    <body>
        {% block body %}
        {% endblock body %}
    </body>
</html>
