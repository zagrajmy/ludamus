{% load i18n %}
{% with desc="-"|add:column %}
    {% if filter_sort == column %}
        <th scope="col"
            aria-sort="ascending"
            class="text-left text-xs font-medium text-foreground-muted uppercase tracking-wider">
            <a href="{% querystring sort=desc page=None %}"
               class="flex items-center px-6 py-3 hover:text-foreground">
                {{ label }}<span aria-hidden="true" class="ml-1">▲</span>
            </a>
        </th>
    {% elif filter_sort == desc %}
        <th scope="col"
            aria-sort="descending"
            class="text-left text-xs font-medium text-foreground-muted uppercase tracking-wider">
            <a href="{% querystring sort=column page=None %}"
               class="flex items-center px-6 py-3 hover:text-foreground">
                {{ label }}<span aria-hidden="true" class="ml-1">▼</span>
            </a>
        </th>
    {% else %}
        <th scope="col"
            aria-sort="none"
            class="text-left text-xs font-medium text-foreground-muted uppercase tracking-wider">
            <a href="{% querystring sort=column page=None %}"
               class="group flex items-center px-6 py-3 text-foreground-muted hover:text-foreground">
                {{ label }}<span aria-hidden="true" class="ml-1 opacity-40 group-hover:opacity-70">↕</span>
            </a>
        </th>
    {% endif %}
{% endwith %}
