{% load i18n %}
{% load tessera %}
<dialog id="{{ modal_id }}"
        class="modal w-[calc(100%-2rem)] max-w-md p-0"
        aria-labelledby="{{ modal_id }}-title">
    <form method="post"
          action="{% url 'panel:time-slot-create' slug=current_event.slug %}?create=1"
          onsubmit="this.querySelector('button[type=submit]').disabled = true">
        {% csrf_token %}
        <div class="px-6 pt-5 pb-4">
            <h3 id="{{ modal_id }}-title" class="font-semibold text-foreground">{% translate "New Time Slot" %}</h3>
            <div class="mt-4">
                {% tessera_errors form %}
                {% tessera_form form %}
            </div>
        </div>
        <div class="flex justify-end gap-2 border-t border-border px-6 py-3">
            <button type="button"
                    class="btn btn-secondary"
                    data-modal-close="{{ modal_id }}">{% translate "Cancel" %}</button>
            {% translate "Add Time Slot" as t_add_time_slot %}
            {% tessera_button t_add_time_slot %}
        </div>
    </form>
</dialog>
