{% load i18n %}
{% with desc="-"|add:column %}
    <th scope="col"
        class="px-6 py-3 text-left text-xs font-medium text-foreground-muted uppercase tracking-wider">
        {% if filter_sort == column %}
            <a href="{% querystring sort=desc page=None %}"
               class="inline-flex items-center hover:text-foreground">
                {{ label }}<span aria-hidden="true" class="ml-1">▲</span>
            </a>
        {% elif filter_sort == desc %}
            <a href="{% querystring sort=column page=None %}"
               class="inline-flex items-center hover:text-foreground">
                {{ label }}<span aria-hidden="true" class="ml-1">▼</span>
            </a>
        {% else %}
            <a href="{% querystring sort=column page=None %}"
               class="inline-flex items-center hover:text-foreground">{{ label }}</a>
        {% endif %}
    </th>
{% endwith %}
