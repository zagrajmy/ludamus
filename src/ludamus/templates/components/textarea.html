{# Textarea field. #}
{# Variables: id, name, rows (default 4), placeholder, value, required (bool), has_errors, aria_describedby, autocomplete, spellcheck, autocapitalize, autocorrect, monospace (bool) #}
<textarea class="w-full px-3 py-2 {% if monospace|default:False %}font-mono text-xs{% else %}text-sm leading-relaxed{% endif %} rounded-lg border {% if has_errors|default:False %}border-danger{% else %}border-border{% endif %} bg-bg-secondary text-foreground placeholder:text-foreground-muted disabled:opacity-50 disabled:cursor-not-allowed"
          {% if id|default:"" %}id="{{ id }}"{% endif %}
          {% if name|default:"" %}name="{{ name }}"{% endif %}
          rows="{{ rows|default:'4' }}"
          {% if placeholder|default:"" %}placeholder="{{ placeholder }}"{% endif %}
          {% if required|default:False %}required{% endif %}
          {% if has_errors|default:False %}aria-invalid="true"{% endif %}
          {% if aria_describedby|default:"" %}aria-describedby="{{ aria_describedby }}"{% endif %}
          {% if autocomplete|default:"" %}autocomplete="{{ autocomplete }}"{% endif %}
          {% if spellcheck|default:"" %}spellcheck="{{ spellcheck }}"{% endif %}
          {% if autocapitalize|default:"" %}autocapitalize="{{ autocapitalize }}"{% endif %}
          {% if autocorrect|default:"" %}autocorrect="{{ autocorrect }}"{% endif %}>{% if value|default:"" %}{{ value }}{% endif %}</textarea>
