{% load i18n tessera %}
<fieldset class="theme-switcher relative flex items-center gap-0.5 rounded-lg p-0.5 bg-bg-tertiary">
    <legend class="sr-only">{% translate "Select a display theme:" %}</legend>
    <!-- Sliding indicator -->
    <span class="theme-indicator absolute w-8 h-8 rounded-md transition-transform duration-200 ease-out bg-bg-secondary"
          style="box-shadow: 0 1px 2px rgba(0,0,0,0.05)"></span>
    <span class="relative h-full z-10">
        <input type="radio"
               name="theme"
               value="system"
               id="theme-system"
               class="sr-only peer"
               checked>
        <label for="theme-system"
               class="flex items-center justify-center w-8 h-8 rounded-md cursor-pointer transition-colors text-foreground-muted"
               title="{% translate "System theme" %}">
            <span class="sr-only">{% translate "system" %}</span>
            {% icon "computer-desktop" class="w-4 h-4" %}
        </label>
    </span>
    <span class="relative h-full z-10">
        <input type="radio"
               name="theme"
               value="light"
               id="theme-light"
               class="sr-only peer">
        <label for="theme-light"
               class="flex items-center justify-center w-8 h-8 rounded-md cursor-pointer transition-colors text-foreground-muted"
               title="{% translate "Light theme" %}">
            <span class="sr-only">{% translate "light" %}</span>
            {% icon "sun" class="w-4 h-4" %}
        </label>
    </span>
    <span class="relative h-full z-10">
        <input type="radio"
               name="theme"
               value="dark"
               id="theme-dark"
               class="sr-only peer">
        <label for="theme-dark"
               class="flex items-center justify-center w-8 h-8 rounded-md cursor-pointer transition-colors text-foreground-muted"
               title="{% translate "Dark theme" %}">
            <span class="sr-only">{% translate "dark" %}</span>
            {% icon "moon" class="w-4 h-4" %}
        </label>
    </span>
</fieldset>
