{% load tessera %}
<a class="{% if variant == 'segment' %}flex items-center gap-1.5 rounded-md px-3 py-1.5 text-sm font-medium whitespace-nowrap text-foreground-muted transition-colors hover:text-foreground aria-selected:bg-bg-secondary aria-selected:text-foreground aria-selected:shadow-sm{% else %}tab-nav-link{% endif %}"
   role="tab"
   href="{{ href }}"
   aria-selected="{% if active %}true{% else %}false{% endif %}"
   data-tab="{{ tab_key }}">
    {% if icon %}
        {% icon icon class="w-4 h-4" %}
    {% endif %}
    {{ label }}
</a>
