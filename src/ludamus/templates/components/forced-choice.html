{# The field has exactly one selectable, required option, so there is nothing #}
{# to decide. A hidden input submits the value; a disabled (non-submitting) #}
{# input shows it, carrying the field id so the rendered <label for=id> #}
{# associates with it and screen readers announce a clearly non-editable field. #}
<input type="hidden" name="{{ name }}" value="{{ value }}">
<input type="text"
       value="{{ label }}"
       {% if id %}id="{{ id }}"{% endif %}
       disabled
       aria-readonly="true"
       class="w-full px-3 py-2 text-sm rounded-lg border border-border bg-bg-tertiary text-foreground-secondary cursor-not-allowed">
