{# variant="segment": a segmented control for free-floating view switchers #}
{# (matches the tessera_switcher look); default: raised card tabs that #}
{# attach to a panel edge below (e.g. tab-shell). #}
{% if variant == 'segment' %}
    <nav class="inline-flex items-center gap-0.5 rounded-lg bg-bg-tertiary p-0.5{% if extra_class %} {{ extra_class }}{% endif %}"
         role="tablist"
         {% if aria_label %}aria-label="{{ aria_label }}"{% endif %}>
        {{ tabs }}
    </nav>
{% else %}
    <div class="tab-nav-scroll">
        <nav class="tab-nav{% if extra_class %} {{ extra_class }}{% endif %}"
             role="tablist"
             {% if aria_label %}aria-label="{{ aria_label }}"{% endif %}>
            {{ tabs }}
        </nav>
    </div>
{% endif %}
