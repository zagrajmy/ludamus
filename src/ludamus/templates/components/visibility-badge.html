{% load i18n %}

        {% include "components/icon-eye.html" %}

{% else %}
    <span class="ml-1 inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-bg-tertiary text-foreground-muted">

{% endif %}
