{% load i18n %}
{% if passed %}
    <span class="text-success font-medium">{% translate "Check passed." %}</span>
{% else %}
    {% translate "Check failed." as default_hint %}
    <span class="text-danger font-medium">{{ hint|default:default_hint }}</span>
{% endif %}
<input hx-swap-oob="true"
       type="hidden"
       id="id_last_ok_signature"
       name="last_ok_signature"
       value="{{ signature }}">
