{# Day heading shared by the ledger and rooms layouts of the compact #}
{# schedule. Expects `day` with a `first_start` datetime. #}
<h3 class="mb-2 flex items-baseline gap-2 border-b border-border px-2 pb-2 text-sm font-bold uppercase tracking-wide text-foreground-secondary">
    {{ day.first_start|date:"l" }}
    <span class="text-xs font-medium normal-case tracking-normal text-foreground-muted">{{ day.first_start|date:"j F" }}</span>
</h3>
