{% load i18n tessera %}
<div class="card">
    <div class="card-body space-y-2">
        <div class="relative share-menu-wrapper">
            <button type="button"
                    class="btn btn-secondary text-sm w-full share-toggle-btn">
                {% icon "share" class="h-4 w-4" variant="mini" %}
                {% translate "Share" %}
            </button>
            <div class="share-menu hidden absolute top-full left-0 right-0 mt-1 rounded-lg border border-border bg-bg-secondary shadow-(--shadow-dropdown) z-10">
                <button type="button"
                        class="copy-link-btn w-full px-3 py-2 text-sm text-left text-foreground hover:bg-bg-tertiary focus-visible:bg-bg-tertiary rounded-t-lg"
                        data-copied-text="{% translate "Copied!" %}"
                        data-default-text="{% translate "Copy link" %}">
                    {% icon "link" class="h-4 w-4 inline" variant="mini" %}
                    {% translate "Copy link" %}
                </button>
                <button type="button"
                        class="copy-info-btn w-full px-3 py-2 text-sm text-left text-foreground hover:bg-bg-tertiary focus-visible:bg-bg-tertiary">
                    {% icon "clipboard-document" class="h-4 w-4 inline" variant="mini" %}
                    {% translate "Copy info" %}
                </button>
                <button type="button"
                        class="show-qr-btn w-full px-3 py-2 text-sm text-left text-foreground hover:bg-bg-tertiary focus-visible:bg-bg-tertiary rounded-b-lg">
                    {% icon "qr-code" class="h-4 w-4 inline" variant="mini" %}
                    {% translate "Show QR code" %}
                </button>
            </div>
        </div>
        <a href="{% url 'web:notice-board:edit' pk=encounter.pk %}"
           class="btn btn-secondary text-sm w-full text-center">
            {% icon "pencil-square" class="h-4 w-4" variant="mini" %}
            {% translate "Edit encounter" %}
        </a>
        <form method="post"
              action="{% url 'web:notice-board:delete' pk=encounter.pk %}"
              onsubmit="return confirm('{% translate "Are you sure you want to delete this encounter?" %}')">
            {% csrf_token %}
            <button type="submit"
                    class="btn text-sm w-full text-danger hover:bg-danger-bg">
                {% icon "trash" class="h-4 w-4" variant="mini" %}
                {% translate "Delete encounter" %}
            </button>
        </form>
    </div>
</div>
