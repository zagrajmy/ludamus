[settings]
# dependent tasks will run in parallel.
jobs = 8

[tools]
python = "3.14"
node = "v25.6.1"
"ast-grep" = "0.42.1"

[env]
# Mise creates and activates this virtualenv automatically
_.python.venv = { path = ".venv", create = true }
_.file = ".env"

[task_config]
includes = ["tasks.toml"]

[tasks.update]
description = "Update all dependencies: pre-commit hooks, pip, Poetry packages"
run = [
    "pip install -U pip",
    "pip install -U poetry",
    "poetry update",
    "pre-commit autoupdate",
    { task = "deptry" },
    "pip-audit .",
    "poetry show -o",
]

# LINT

[tasks._lint]
description = "Base env vars for lint tasks"
run = ""
env.DB_NAME = ":memory:"
env.ENV = "local"
env.PYTHONPATH = "src"
env.SECRET_KEY = "dev-secret-key"
env.CREDENTIALS_ENCRYPTION_KEY = "gWc408f8j3ZQUm5Ly4EXQC2EwFRf50AhePkmZKL5N9E="

[tasks.black]
description = "Format Python code with Black"
run = { task = "_lint", args = ["black", "src", "tests"] }

[tasks.black-check]
description = "Check Python formatting without modifying files"
run = { task = "black", args = ["--check"] }

[tasks.taplo]
description = "Format TOML files"
run = "taplo format --config=.taplo.toml"

[tasks.codespell]
description = "Find typos in source and test files"
run = [
    { task = "_lint", args = ["codespell", "src", "tests/unit", "tests/integration"] },
]

[tasks.deptry]
description = "Detect missing, unused, or transitive dependency imports"
run = { task = "_lint", args = ["deptry", "src", "tests"] }

[tasks.djlint]
description = "Lint Django templates"
run = { task = "_lint", args = ["djlint", "src", "--profile=django"] }

[tasks.djlint-format]
description = "Reformat Django templates, CSS, and JS"
run = { task = "djlint", args = ["--reformat", "--format-css", "--format-js"] }

[tasks.il]
description = "Enforce GLIMPSE layer import rules"
run = { task = "_lint", args = ["lint-imports", "--config=pyproject.toml"] }

[tasks.mypy]
description = "Type-check Python source with mypy"
run = { task = "_lint", args = ["mypy", "src"] }

[tasks.pylint]
description = "Run Pylint on source and tests (duplicate-code disabled for tests)"
run = [
    { task = "_lint", args = ["pylint", "src"] },
    { task = "_lint", args = ["pylint", "--disable=duplicate-code", "tests"] },
]

[tasks.ruff]
description = "Lint Python with Ruff (report only)"
run = { task = "_lint", args = ["ruff", "check", "src", "tests"] }

[tasks.ruff-fix]
description = "Lint Python with Ruff and auto-fix violations"
run = { task = "ruff", args = ["--fix"] }

[tasks.ast-grep]
description = "Run structural code pattern checks via ast-grep"
run = "ast-grep scan --error src"

[tasks.vulture]
description = "Find dead Python code"
run = "vulture --config=pyproject.toml src"

[tasks.impeccable]
run = "python scripts/impeccable_lint.py"

[tasks.check]
description = "Format, lint, and fix — run all code quality tools"
run = [
    { task = "black" },
    { task = "ruff-fix" },
    { task = "taplo" },
    { task = "djlint-format" },
    { tasks = ["codespell", "mypy", "il", "djlint", "pylint", "vulture", "ast-grep", "impeccable"] },
]

[tasks.prcheck]
description = "CI-style lint pass: report violations without fixing"
run = [
    { task="black-check" },
    { task="ruff" },
    { task="codespell" },
    { task="mypy" },
    { task="djlint" },
    { task="pylint" },
    { task="vulture" },
    { task="ast-grep" },
]

# PYTEST

[tasks._pytest]
description = "Base pytest runner with test env (internal)"
run = "pytest"
env.ALLOWED_HOSTS = ".testserver"
env.AUTH0_CLIENT_ID = "test-auth0-client-id"
env.AUTH0_CLIENT_SECRET = "test-auth0-client-secret"
env.AUTH0_DOMAIN = "auth0.example.com"
env.DB_NAME = ":memory:"
env.ENV = "local"
env.MEMBERSHIP_API_BASE_URL = "https://membership-test.example.com/api/v1/endpoint"
env.MEMBERSHIP_API_TOKEN = "membership-test-token"
env.PYTHONPATH = "src"
env.ROOT_DOMAIN = "testserver"
env.SECRET_KEY = "dev-secret-key"
env.SESSION_COOKIE_DOMAIN = ".testserver"
env.CREDENTIALS_ENCRYPTION_KEY = "gWc408f8j3ZQUm5Ly4EXQC2EwFRf50AhePkmZKL5N9E="

[tasks.unittest]
description = "Run unit tests"
run = { task = "_pytest", args = ["tests/unit", "--cov=tests.unit", "--cov=ludamus"] }

[tasks.test]
description = "Run all tests"
run = { task = "_pytest", args = ["tests", "tests/integration", "tests/unit"] }
env.COVERAGE_FILE = "{{ config_root }}/.coverage.unit"

[tasks."test:mutation"]
description = "Run mutation tests"
run = { task = "_pytest", args = ["--gremlins", "tests"] }
env.COVERAGE_FILE = "{{ config_root }}/.coverage.unit"

[tasks.diff-cover]
description = "Show test coverage for lines changed since main"
wait_for = ["coverage"]
run = [
    "coverage xml --data-file=.coverage",
    "diff-cover coverage.xml --compare-branch=main",
]

[tasks."coverage:combine"]
description = "Combine integration + e2e coverage and export XML"
run = [
    "coverage combine .coverage.unit .coverage.e2e",
    "coverage xml -o coverage.xml",
    "coverage report --fail-under=97",
]
env.PYTHONPATH = "src"

# E2E

[tasks._e2e]
description = "Base env vars for e2e tasks (internal)"
run = ''
env.ALLOWED_HOSTS = ".localhost"
env.AUTH0_CLIENT_ID = "test-auth0-client-id"
env.AUTH0_CLIENT_SECRET = "test-auth0-client-secret"
env.AUTH0_DOMAIN = "auth0.example.com"
env.COVERAGE_FILE = "{{ config_root }}/.coverage.e2e"
env.DB_NAME = "dev.e2e.sqlite3"
env.DJANGO_SETTINGS_MODULE = "ludamus.edges.settings"
env.ENV = "local"
env.MEMBERSHIP_API_BASE_URL = "https://membership-test.example.com/api/v1/endpoint"
env.MEMBERSHIP_API_TOKEN = "membership-test-token"
env.PYTHONPATH = "src"
env.ROOT_DOMAIN = "localhost:8000"
env.SECRET_KEY = "e2e-secret-key"
env.SESSION_COOKIE_DOMAIN = ".localhost"
env.CREDENTIALS_ENCRYPTION_KEY = "gWc408f8j3ZQUm5Ly4EXQC2EwFRf50AhePkmZKL5N9E="

[tasks."install:playwright"]
run = ["npm install", "npx playwright install --with-deps"]
description = "Install Playwright"
dir = "tests/e2e"

[tasks.e2e]
description = "Run end-to-end Playwright tests"
run = [
    "npx playwright test --workers=1",
    { "task" = "_e2e", args = ["coverage", "report"] },
]
dir = "tests/e2e"

[tasks."boot-e2e"]
description = "Bootstrap and start dev server for e2e tests"
run = [
    { task = "_e2e", args = ["django-admin", "migrate", "--noinput"] },
    { task = "_e2e", args = ["django-admin", "createcachetable"] },
    { task = "_e2e", args = ["django-admin", "downloadvendor"] },
    { task = "_e2e", args = ["python", "tests/e2e/scripts/bootstrap_data.py"] },
    { task = "_e2e", args = ["python", "tests/e2e/scripts/bootstrap_facilitators.py"] },
    { task = "_e2e", args = ["python", "tests/e2e/scripts/bootstrap_timetable.py"] },
    { task = "build-frontend" },
    { task = "_e2e", args = ["coverage", "run", "--source=src", "-m", "django", "runserver", "--insecure", "--noreload"] },
]

# DEPLOYMENT

[tasks.dc]
description = "Run docker compose for a target environment (local or prod)"
usage = '''
arg "<environment>" help="Target environment" {
  choices "local" "prod"
}
arg "[dc_args]" var=#true double_dash="optional"
'''
run = [
    "GIT_COMMIT_SHA=${GIT_COMMIT_SHA:-$(git rev-parse --short HEAD)}",
    "docker compose -f docker/compose/{{ usage.environment }}.yaml {{arg(name'dc_args')}}",
]

[tasks.kill]
description = "Kill dev servers (Django on :8000, Vite on :5173)"
run = "lsof -ti :8000 | xargs kill -9 2>/dev/null; lsof -ti :5173 | xargs kill -9 2>/dev/null; echo 'Dev servers killed'"

# FRONTEND

[tasks.ts-check]
description = "Type-check frontend TypeScript"
run = { task = "fnpm", args = ["run", "typecheck"] }


# OTHER

[tasks.shitcheck]
description = "Flag suspicious additions vs main: noqa, type: ignore, Any, cast"
run = "git diff main '*.py'|grep -E '^\\+.*(noqa|type: ignore|Any|ANY|pylint|pragma|\bobject\b|cast\\()'"

[tasks.coverage]
description = "Run all tests, collect coverage, enforce 97% threshold"
run = [
    { task = "test", args = ["--cov"] },
    { task = "e2e" },
    { task = "coverage:combine" },
]
